<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
  >
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="/static/css/style.css">
  <title>Teşekkürler</title>
</head>
<body>
  <header class="header">
    <div class="header__text">
      <h1>Teşekkürler!</h1>
      <p>Formu doldurduğunuz için teşekkür ederiz, {{ name }}.</p>
    </div>
  </header>
  <main>
    {% block content %}
    <div class="main__rez" style="padding: 2rem; text-align: center;">
      <p>Talebinizi aldık. En kısa sürede sizinle iletişime geçeceğiz.</p>
      <a class="main_link" href="{{ url_for('index') }}">Ana sayfaya dön</a>
    </div>
    {% endblock %}
  </main>
  <footer>

  </footer>
</body>
</html>
